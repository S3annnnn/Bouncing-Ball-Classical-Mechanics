<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bouncing Ball: Dual Energy Cap</title>
    <style>
        body { 
            margin: 0; background: #111; color: white; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }
        .main-layout { display: flex; gap: 20px; align-items: flex-start; }
        canvas { border: 2px solid #333; background: #000; border-radius: 8px; }
        
        .controls {
            width: 260px; background: rgba(40, 40, 40, 0.9); 
            padding: 20px; border-radius: 8px; border: 1px solid #444;
        }
        
        .control-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 8px; color: #ccc; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        .bar-bg { background: #222; height: 12px; border-radius: 6px; margin: 8px 0 15px 0; overflow: hidden; position: relative; }
        #mechBar { background: #3296ff; height: 100%; width: 100%; }
        #thermBar { background: #ff4d4d; height: 100%; width: 0%; }
        /* Visual marker for the thermal cap */
        .cap-marker { position: absolute; right: 0; top: 0; bottom: 0; width: 2px; background: white; opacity: 0.5; }
        
        .energy-text { font-size: 13px; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .total-text { 
            text-align: center; color: #00ff88; font-weight: bold; 
            margin-top: 15px; border-top: 1px solid #555; padding-top: 15px; 
        }
        .warning { color: #ffcc00; font-size: 11px; margin-top: 5px; text-align: center; display: none; }
        
        button {
            width: 100%; padding: 10px; background: #444; color: white;
            border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;
        }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div class="main-layout">
        <canvas id="canvas"></canvas>
        
        <div class="controls">
            <h3 style="margin-top:0; color: #3296ff;">System Controls</h3>
            
            <div class="control-group">
                <label>Drop Height: <span id="hLabel">300</span>px</label>
                <input type="range" id="hSlider" min="50" max="400" value="300">
            </div>

            <div class="control-group">
                <label>Elasticity: <span id="eLabel">0.80</span></label>
                <input type="range" id="eSlider" min="0" max="1" step="0.01" value="0.80">
            </div>

            <button onclick="resetBall()">Reset Simulation</button>

            <div class="total-text">Total Energy Cap: 180 J</div>
            
            <div style="margin-top:20px">
                <div class="energy-text"><span>Mechanical</span><span id="mechVal">0</span></div>
                <div class="bar-bg"><div id="mechBar"></div></div>
                
                <div class="energy-text"><span>Thermal (Cap: 100 J)</span><span id="thermVal">0</span></div>
                <div class="bar-bg">
                    <div id="thermBar"></div>
                    <div class="cap-marker"></div>
                </div>
                <div id="capWarning" class="warning">THERMAL CAP REACHED</div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 600;
    canvas.height = 500;

    const hSlider = document.getElementById('hSlider');
    const eSlider = document.getElementById('eSlider');
    const hLabel = document.getElementById('hLabel');
    const eLabel = document.getElementById('eLabel');
    const capWarning = document.getElementById('capWarning');

    const TOTAL_ENERGY_CAP = 180;
    const THERMAL_ENERGY_CAP = 100;
    const g = 0.5; 
    const groundY = canvas.height - 40;

    let ball = {
        x: canvas.width / 2,
        y: 100,
        vy: 0,
        radius: 18,
        thermal: 0,
        restitution: 0.8,
        mass: 1
    };

    function resetBall() {
        const dropHeight = parseInt(hSlider.value);
        ball.y = groundY - dropHeight;
        ball.vy = 0;
        ball.thermal = 0;
        ball.restitution = parseFloat(eSlider.value);
        
        // Adjust mass so PE = 180 J
        ball.mass = TOTAL_ENERGY_CAP / (g * dropHeight);
        
        hLabel.innerText = dropHeight;
        eLabel.innerText = ball.restitution;
        capWarning.style.display = "none";
    }

        // Position Step
        ball.y += ball.vy + 0.5 * g;
        let vNext = ball.vy + 0.5
