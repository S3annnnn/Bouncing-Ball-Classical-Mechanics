<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bouncing Ball: Perpetual Energy</title>
    <style>
        body { 
            margin: 0; background: #111; color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }
        canvas { border: 2px solid #333; background: #000; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 600;
    canvas.height = 500;

    const ball = {
        x: canvas.width / 2,
        y: 100,
        radius: 20,
        vy: 0,
        mass: 1,
        restitution: 1.0 // 1.0 = Perfect bounce (No energy loss)
    };

    const g = 0.5; 
    const groundY = canvas.height - ball.radius - 20;

    function animate() {
        // 1. Apply Gravity to Velocity
        ball.vy += g;

        // 2. Apply Velocity to Position
        ball.y += ball.vy;

        // 3. Simple Collision Detection
        if (ball.y >= groundY) {
            ball.y = groundY;    // Snap to floor so it doesn't fall through
            ball.vy *= -1;       // Flip velocity perfectly
        }

        draw();
        requestAnimationFrame(animate);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Ground
        ctx.fillStyle = '#444';
        ctx.fillRect(0, groundY + ball.radius, canvas.width, 20);

        // Draw Energy Bar (Visualizing Mechanical Energy)
        const barWidth = 400;
        const barX = (canvas.width - barWidth) / 2;
        
        // Potential Energy + Kinetic Energy
        const h = groundY - ball.y;
        const currentEnergy = (ball.mass * g * h) + (0.5 * ball.mass * Math.pow(ball.vy, 2));

        // The Bar (Should stay full/consistent)
        ctx.fillStyle = '#3296ff';
        ctx.fillRect(barX, 40, barWidth, 20);
        
        ctx.fillStyle = "white";
        ctx.fillText("Conserved Mechanical Energy", barX, 35);
        ctx.fillText(`Total: ${Math.abs(currentEnergy).toFixed(0)} units`, barX, 75);

        // Draw Ball
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#3296ff';
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.closePath();
    }

    animate();
</script>
</body>
</html>
