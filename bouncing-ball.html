<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermodynamic Energy Simulation</title>
    <style>
        body {
            margin: 0; background-color: #121212; color: white;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif;
        }
        canvas { border: 1px solid #333; background: #000; border-radius: 4px; }
        
        .container { display: flex; gap: 30px; align-items: flex-start; }

        /* Energy Bar Styling */
        .energy-viz {
            width: 250px; background: #222; padding: 20px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .bar-container {
            height: 25px; width: 100%; background: #333; 
            margin: 10px 0; border-radius: 12px; overflow: hidden;
            display: flex;
        }
        #mechBar { background: #3296ff; height: 100%; transition: width 0.1s; }
        #thermBar { background: #ff4d4d; height: 100%; transition: width 0.1s; }
        
        .label-group { display: flex; justify-content: space-between; font-size: 0.85em; }
        .total-box { 
            margin-top: 15px; padding-top: 10px; border-top: 1px solid #444;
            text-align: center; font-weight: bold; color: #00ff88;
        }
    </style>
</head>
<body>

    <div class="container">
        <canvas id="simCanvas"></canvas>

        <div class="energy-viz">
            <h3 style="margin-top:0">Energy Distribution</h3>
            
            <div class="label-group">
                <span>Mechanical (KE+PE)</span>
                <span id="mechVal">0</span>
            </div>
            <div class="bar-container">
                <div id="mechBar" style="width: 100%"></div>
            </div>

            <div class="label-group">
                <span>Thermal (Heat)</span>
                <span id="thermVal">0</span>
            </div>
            <div class="bar-container">
                <div id="thermBar" style="width: 0%"></div>
            </div>

            <div class="total-box">
                Total System Energy: <span id="totalVal">0</span>
            </div>
            <p style="font-size: 0.7em; color: #888; margin-top: 20px;">
                *Notice how the total stays constant as the blue bar converts into the red bar.
            </p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = 500;
    canvas.height = 400;

    const ball = {
        y: 50,
        vy: 0,
        radius: 18,
        mass: 1,
        restitution: 0.8, 
        thermalEnergy: 0
    };

    const g = 0.45; 
    const groundY = canvas.height - ball.radius;
    
    // Initial Energy for scaling the bars
    const initialHeight = groundY - ball.y;
    const initialEnergy = ball.mass * g * initialHeight;

    function update() {
        // --- Velocity Verlet Integration ---
        ball.y += ball.vy + 0.5 * g;
        let vBefore = ball.vy + 0.5 * g;
        
        if (ball.y >= groundY) {
            ball.y = groundY;
            let keBefore = 0.5 * ball.mass * Math.pow(vBefore, 2);
            
            // Inelastic collision
            ball.vy = -vBefore * ball.restitution;
            
            let keAfter = 0.5 * ball.mass * Math.pow(ball.vy, 2);
            
            // Heat generated = Kinetic Energy lost
            // We cap the math to avoid floating point overshoot
            ball.thermalEnergy += Math.max(0, keBefore - keAfter);
        } else {
            ball.vy += g;
        }

        render();
        updateUI();
        requestAnimationFrame(update);
    }

    function updateUI() {
        const height = groundY - ball.y;
        const pe = ball.mass * g * height;
        const ke = 0.5 * ball.mass * Math.pow(ball.vy, 2);
        const currentMech = pe + ke;
        const total = currentMech + ball.thermalEnergy;

        // Update Numbers
        document.getElementById('mechVal').innerText = currentMech.toFixed(1);
        document.getElementById('thermVal').innerText = ball.thermalEnergy.toFixed(1);
        document.getElementById('totalVal').innerText = total.toFixed(1);

        // Update Bars (Percentage of total system energy)
        document.getElementById('mechBar').style.width = (currentMech / total * 100) + "%";
        document.getElementById('thermBar').style.width = (ball.thermalEnergy / total * 100) + "%";
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw floor
        ctx.fillStyle = "#444";
        ctx.fillRect(0, canvas.height - 2, canvas.width, 2);

        // Ball Color transition (more red as it heats up)
        const heatRatio = Math.min(ball.thermalEnergy / initialEnergy, 1);
