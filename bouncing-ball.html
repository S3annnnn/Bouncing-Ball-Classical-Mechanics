<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inelastic Collision & Thermal Energy</title>
    <style>
        body {
            margin: 0; background-color: #1a1a1a; color: white;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; font-family: sans-serif;
        }
        canvas { border: 2px solid #444; background: #000; border-radius: 8px; }
        .dashboard {
            display: grid; grid-template-columns: repeat(3, 150px);
            gap: 20px; margin-bottom: 20px; text-align: center;
        }
        .val { font-size: 1.2em; font-weight: bold; display: block; }
        .thermal { color: #ff4d4d; }
        .mechanical { color: #3296ff; }
        .total { color: #00ff88; border-top: 1px solid #444; padding-top: 5px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div><small>Mechanical (PE+KE)</small><span id="mechEnergy" class="val mechanical">0</span></div>
        <div><small>Thermal (Heat)</small><span id="thermalEnergy" class="val thermal">0</span></div>
        <div><small>Total System Energy</small><span id="totalEnergy" class="val total">0</span></div>
    </div>
    <canvas id="simCanvas"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = 600;
    canvas.height = 400;

    const ball = {
        y: 50,
        vy: 0,
        radius: 15,
        mass: 1,
        restitution: 0.8, // Loses 20% velocity each bounce
        thermalEnergy: 0
    };

    const g = 0.4; 
    const groundY = canvas.height - ball.radius;

    function update() {
        // --- Velocity Verlet ---
        ball.y += ball.vy + 0.5 * g;
        let vBefore = ball.vy + 0.5 * g;
        
        // --- Collision with Heat Generation ---
        if (ball.y >= groundY) {
            ball.y = groundY;
            
            // Calculate Kinetic Energy before impact: 0.5 * m * v^2
            let keBefore = 0.5 * ball.mass * Math.pow(vBefore, 2);
            
            // Apply inelastic bounce
            ball.vy = -vBefore * ball.restitution;
            
            // Calculate Kinetic Energy after impact
            let keAfter = 0.5 * ball.mass * Math.pow(ball.vy, 2);
            
            // The difference is converted to Thermal Energy
            ball.thermalEnergy += (keBefore - keAfter);
        } else {
            ball.vy += g;
        }

        draw();
        calcSystem();
        requestAnimationFrame(update);
    }

    function calcSystem() {
        const height = groundY - ball.y;
        const pe = ball.mass * g * height;
        const ke = 0.5 * ball.mass * Math.pow(ball.vy, 2);
        const mech = pe + ke;

        document.getElementById('mechEnergy').innerText = mech.toFixed(2);
        document.getElementById('thermalEnergy').innerText = ball.thermalEnergy.toFixed(2);
        document.getElementById('totalEnergy').innerText = (mech + ball.thermalEnergy).toFixed(2);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw floor
        ctx.fillStyle = "#444";
        ctx.fillRect(0, canvas.height - 2, canvas.width, 2);

        // Draw ball (Color shifts to red as it gets "hotter")
        const heatFactor = Math.min(ball.thermalEnergy / 100, 1);
        const r = Math.floor(50 + (205 * heatFactor));
        const b = Math.floor(255 - (205 * heatFactor));

        ctx.arc(canvas.width/2, ball.y,
