<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bouncing Ball: Perfect Conservation</title>
    <style>
        body { 
            margin: 0; background: #111; color: white; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }
        .main-layout { display: flex; gap: 20px; align-items: flex-start; }
        canvas { border: 2px solid #333; background: #000; border-radius: 8px; }
        
        .controls {
            width: 250px; background: rgba(40, 40, 40, 0.9); 
            padding: 20px; border-radius: 8px; border: 1px solid #444;
        }
        
        .control-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 8px; color: #ccc; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        .bar-bg { background: #222; height: 12px; border-radius: 6px; margin: 8px 0 15px 0; overflow: hidden; }
        #mechBar { background: #3296ff; height: 100%; width: 100%; }
        #thermBar { background: #ff4d4d; height: 100%; width: 0%; }
        #totalBar { background: #00ff88; height: 100%; width: 100%; }
        
        .energy-text { font-size: 13px; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .total-text { 
            text-align: center; color: #00ff88; font-weight: bold; 
            margin-top: 15px; border-top: 1px solid #555; padding-top: 15px; 
        }
        button {
            width: 100%; padding: 10px; background: #3296ff; color: white;
            border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;
            font-weight: bold;
        }
        button:hover { background: #2670c4; }
    </style>
</head>
<body>

    <div class="main-layout">
        <canvas id="canvas"></canvas>
        
        <div class="controls">
            <h3 style="margin-top:0; color: #3296ff;">Physics Controller</h3>
            
            <div class="control-group">
                <label>Drop Height: <span id="hLabel">300</span>px</label>
                <input type="range" id="hSlider" min="50" max="400" value="300">
            </div>

            <div class="control-group">
                <label>Elasticity: <span id="eLabel">0.85</span></label>
                <input type="range" id="eSlider" min="0" max="1" step="0.01" value="0.85">
            </div>

            <button onclick="resetBall()">Drop New Ball</button>

            <div class="total-text">Closed System: 180.0 J</div>
            
            <div style="margin-top:20px">
                <div class="energy-text"><span>Mechanical</span><span id="mechVal">180.0</span></div>
                <div class="bar-bg"><div id="mechBar"></div></div>
                
                <div class="energy-text"><span>Thermal</span><span id="thermVal">0.0</span></div>
                <div class="bar-bg"><div id="thermBar"></div></div>

                <div class="energy-text"><span>Total</span><span id="totalVal">180.0</span></div>
                <div class="bar-bg"><div id="totalBar"></div></div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 600;
    canvas.height = 500;

    const hSlider = document.getElementById('hSlider');
    const eSlider = document.getElementById('eSlider');
    const hLabel = document.getElementById('hLabel');
    const eLabel = document.getElementById('eLabel');

    const TOTAL_ENERGY = 180;
    const g = 0.5; 
    const groundY = canvas.height - 40;

    let ball = {
        x: canvas.width / 2,
        y: 0,
        vy: 0,
        radius: 18,
        thermal: 0,
        restitution: 0.85,
        mass: 1,
        isAtRest: false
    };

    function resetBall() {
        const dropHeight = parseInt(hSlider.value);
        ball.y = groundY - dropHeight;
        ball.vy = 0;
        ball.thermal = 0;
        ball.restitution = parseFloat(eSlider.value);
        ball.isAtRest = false;
        
        // Calibrate mass so PE at start is exactly 180J
        ball.mass = TOTAL_ENERGY / (g * dropHeight);
        
        hLabel.innerText = dropHeight;
        eLabel.innerText = ball.restitution;
    }

    function animate() {
        if (!ball.isAtRest) {
            // Standard Physics
            ball.vy += g;
            ball.y += ball.vy;

            // Collision logic
            if (ball.y >= groundY) {
                ball.y = groundY;
                
                // Reverse and apply elasticity
                ball.vy = -ball.vy * ball.restitution;
                
                // Sleep threshold: If velocity is too low, stop everything
                if (Math.abs(ball.vy) < 0.8) {
                    ball.vy = 0;
                    ball.isAtRest = true;
                }
            }
        }

        updateUI();
        render();
        requestAnimationFrame(animate);
    }

    function updateUI() {
        // Calculate current Mechanical components
        const height = Math.max(0, groundY - ball.y);
        const pe = ball.mass * g * height;
        const ke = 0.5 * ball.mass * (ball.vy * ball.vy);
        
        let mech;
        let therm;

        if (ball.isAtRest) {
            mech = 0;
            therm = TOTAL_ENERGY; // All energy converted to heat
        } else {
            // To ensure the bar always equals 180, we track 
            // the PE+KE and the 'lost' energy as thermal.
            mech = Math.min(TOTAL_ENERGY, pe + ke);
            therm = TOTAL_ENERGY - mech; 
        }
        
        // UI Updates
        document.getElementById('mechVal').innerText = mech.toFixed(1);
        document.getElementById('thermVal').innerText = therm.toFixed(1);
        document.getElementById('totalVal').innerText = (mech + therm).toFixed(1);
        
        document.getElementById('mechBar').style.width = (mech / TOTAL_ENERGY * 100) + "%";
        document.getElementById('thermBar').style.width = (therm / TOTAL_ENERGY * 100) + "%";
        
        hLabel.innerText = hSlider.value;
        eLabel.innerText = eSlider.value;
        
        // Store current thermal for ball color rendering
        ball.thermal = therm;
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Ground
        ctx.fillStyle = '#333';
        ctx.fillRect(0, groundY + ball.radius, canvas.width, 20);

        // Dynamic Color: Transition from Blue (cold/mechanical) to Red (hot/thermal)
        const heatRatio = Math.min(ball.thermal / TOTAL_ENERGY, 1);
        const r = Math.floor(50 + (205 * heatRatio));
        const b = Math.floor(255 - (205 * heatRatio));

        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgb(${r}, 120, ${b})`;
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    resetBall(); 
    animate();
</script>
</body>
</html>
