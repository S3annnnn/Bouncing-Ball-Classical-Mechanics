<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bouncing Ball: Discrete Energy Steps</title>
    <style>
        body { 
            margin: 0; background: #111; color: white; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }
        .main-layout { display: flex; gap: 20px; align-items: flex-start; }
        canvas { border: 2px solid #333; background: #000; border-radius: 8px; }
        
        .controls {
            width: 250px; background: rgba(40, 40, 40, 0.9); 
            padding: 20px; border-radius: 8px; border: 1px solid #444;
        }
        
        .control-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 8px; color: #ccc; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        .bar-bg { background: #222; height: 12px; border-radius: 6px; margin: 8px 0 15px 0; overflow: hidden; }
        #mechBar { background: #3296ff; height: 100%; width: 100%; transition: width 0.3s ease; }
        #thermBar { background: #ff4d4d; height: 100%; width: 0%; transition: width 0.3s ease; }
        #totalBar { background: #00ff88; height: 100%; width: 100%; }
        
        .energy-text { font-size: 13px; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .total-text { 
            text-align: center; color: #00ff88; font-weight: bold; 
            margin-top: 15px; border-top: 1px solid #555; padding-top: 15px; 
        }
        button {
            width: 100%; padding: 10px; background: #3296ff; color: white;
            border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;
            font-weight: bold;
        }
        button:hover { background: #2670c4; }
    </style>
</head>
<body>

    <div class="main-layout">
        <canvas id="canvas"></canvas>
        
        <div class="controls">
            <h3 style="margin-top:0; color: #3296ff;">Impact Energy Monitor</h3>
            
            <div class="control-group">
                <label>Drop Height: <span id="hLabel">300</span>px</label>
                <input type="range" id="hSlider" min="50" max="400" value="300">
            </div>

            <div class="control-group">
                <label>Elasticity: <span id="eLabel">0.85</span></label>
                <input type="range" id="eSlider" min="0" max="1" step="0.01" value="0.85">
            </div>

            <button onclick="resetBall()">Drop New Ball</button>

            <div class="total-text">Total System: 180.0 J</div>
            
            <div style="margin-top:20px">
                <div class="energy-text"><span>Mechanical Energy</span><span id="mechVal">180.0</span></div>
                <div class="bar-bg"><div id="mechBar"></div></div>
                
                <div class="energy-text"><span>Thermal Energy</span><span id="thermVal">0.0</span></div>
                <div class="bar-bg"><div id="thermBar"></div></div>

                <div class="energy-text"><span>Total</span><span id="totalVal">180.0</span></div>
                <div class="bar-bg"><div id="totalBar"></div></div>
            </div>
            <p style="font-size: 11px; color: #777; margin-top: 10px;">*Energy transfers only on ground impact.</p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 600;
    canvas.height = 500;

    const hSlider = document.getElementById('hSlider');
    const eSlider = document.getElementById('eSlider');
    const hLabel = document.getElementById('hLabel');
    const eLabel = document.getElementById('eLabel');

    const TOTAL_ENERGY = 180;
    const g = 0.5; 
    const groundY = canvas.height - 40;

    let ball = {
        x: canvas.width / 2,
        y: 0,
        vy: 0,
        radius: 18,
        currentMech: 180, // Tracked energy
        thermal: 0,       // Tracked energy
        restitution: 0.85,
        isAtRest: false
    };

    function resetBall() {
        const dropHeight = parseInt(hSlider.value);
        ball.y = groundY - dropHeight;
        ball.vy = 0;
        ball.currentMech = TOTAL_ENERGY;
        ball.thermal = 0;
        ball.restitution = parseFloat(eSlider.value);
        ball.isAtRest = false;
        
        hLabel.innerText = dropHeight;
        eLabel.innerText = ball.restitution;
        updateUI();
    }

    function animate() {
        if (!ball.isAtRest) {
            ball.vy += g;
            ball.y += ball.vy;

            if (ball.y >= groundY) {
                ball.y = groundY;
                
                // --- Energy Transfer Logic ---
                // We reduce the mechanical energy by the loss percentage (1 - restitution^2)
                // This happens ONLY on impact.
                const energyLossFactor = 1 - (ball.restitution * ball.restitution);
                const lostEnergy = ball.currentMech * energyLossFactor;
                
                ball.currentMech -= lostEnergy;
                ball.thermal += lostEnergy;

                // Standard Physics bounce
                ball.vy = -ball.vy * ball.restitution;
                
                // Sleep threshold
                if (Math.abs(ball.vy) < 0.8) {
                    ball.vy = 0;
                    ball.thermal = TOTAL_ENERGY;
                    ball.currentMech = 0;
                    ball.isAtRest = true;
                }
                
                updateUI(); // Only need to update UI values on impact
            }
        }

        render();
        requestAnimationFrame(animate);
    }

    function updateUI() {
        // Ensure perfect total
        if (ball.currentMech < 0.1) ball.currentMech = 0;
        if (ball.thermal > 179.9 && ball.isAtRest) ball.thermal = 180;

        document.getElementById('mechVal').innerText = ball.currentMech.toFixed(1);
        document.getElementById('thermVal').innerText = ball.thermal.toFixed(1);
        document.getElementById('totalVal').innerText = (ball.currentMech + ball.thermal).toFixed(1);
        
        document.getElementById('mechBar').style.width = (ball.currentMech / TOTAL_ENERGY * 100) + "%";
        document.getElementById('thermBar').style.width = (ball.thermal / TOTAL_ENERGY * 100) + "%";
        
        hLabel.innerText = hSlider.value;
        eLabel.innerText = eSlider.value;
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#333';
        ctx.fillRect(0, groundY + ball.radius, canvas.width, 20);

        const heatRatio = Math.min(ball.thermal / TOTAL_ENERGY, 1);
        const r = Math.floor(50 + (205 * heatRatio));
        const b = Math.floor(255 - (205 * heatRatio));

        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgb(${r}, 120, ${b})`;
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    resetBall(); 
    animate();
</script>
</body>
</html>
