<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Conserving Bouncing Ball</title>
    <style>
        body {
            margin: 0;
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            border: 2px solid #ffffff;
            background-color: #1a1a1a;
        }
        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="stats">
        <div>Total Energy: <span id="energy">0</span></div>
        <small>Verlet Integration (Elastic e=1.0)</small>
    </div>
    <canvas id="simCanvas"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const energyLabel = document.getElementById('energy');

    // --- Configuration ---
    canvas.width = 800;
    canvas.height = 600;

    const ball = {
        radius: 20,
        y: 100,
        vy: 0,
        mass: 1,
        color: '#3296ff'
    };

    const gravity = 0.5;
    const groundY = canvas.height - ball.radius;

    function update() {
        // --- Velocity Verlet Integration ---
        
        // 1. Position update: y = y + v + 0.5 * a
        ball.y += ball.vy + 0.5 * gravity;

        // 2. Half-step velocity update
        ball.vy += 0.5 * gravity;

        // 3. Perfect Elastic Collision
        if (ball.y >= groundY) {
            ball.y = groundY; // Reset position to prevent sinking
            ball.vy *= -1;    // Reverse velocity perfectly
        }

        // 4. Final half-step velocity update
        ball.vy += 0.5 * gravity;

        draw();
        calculateEnergy();

        requestAnimationFrame(update);
    }

    function calculateEnergy() {
        // Potential Energy (mgh) - inverted because Y increases downwards
        const height = groundY - ball.y;
        const pe = ball.mass * gravity * height;
        
        // Kinetic Energy (0.5 * m * v^2)
        const ke = 0.5 * ball.mass * Math.pow(ball.vy, 2);
        
        const totalEnergy = pe + ke;
        energyLabel.innerText = totalEnergy.toFixed(2);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Ground
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, canvas.height - 5, canvas.width, 5);

        // Draw Ball
        ctx.beginPath();
        ctx.arc(canvas.width / 2, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = ball.color;
        ctx.fill();
        ctx.closePath();
    }

    update();
</script>
</body>
</html>
